name: Release

on:
  push:
    tags:
      - '*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64,arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # One multi-arch build, pushed to both registries in a single pass.
      # Cache lives in GitHub Actions (free, fast, no extra registry round-trip).
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            docker.io/styliteag/mattermost2telegrambot:${{ steps.version.outputs.version }}
            docker.io/styliteag/mattermost2telegrambot:latest
            ghcr.io/styliteag/mattermost2telegrambot:${{ steps.version.outputs.version }}
            ghcr.io/styliteag/mattermost2telegrambot:latest
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GITHASH=${{ github.sha }}

      - name: Delete old GHCR package versions
        uses: actions/delete-package-versions@v5
        continue-on-error: true
        with:
          package-name: "mattermost2telegrambot"
          package-type: "container"
          min-versions-to-keep: 5
          delete-only-untagged-versions: false

      - name: Extract release notes from CHANGELOG
        id: release_notes
        run: |
          python3 << 'EOF' > /tmp/release_notes.md
          import os, re
          version = os.environ['VERSION']
          with open('CHANGELOG.md', 'r') as f:
              content = f.read()
          pattern = rf'^## \[{re.escape(version)}\][^\n]*\n(.*?)(?=^## \[|\Z)'
          m = re.search(pattern, content, re.MULTILINE | re.DOTALL)
          if m:
              notes = re.sub(rf'^## \[{re.escape(version)}\][^\n]*\n', '', m.group(0)).strip()
              print(notes if notes else f"Release {version}")
          else:
              print(f"Release {version}")
          EOF
          echo "notes<<RELEASE_NOTES_EOF" >> $GITHUB_OUTPUT
          cat /tmp/release_notes.md >> $GITHUB_OUTPUT
          echo "RELEASE_NOTES_EOF" >> $GITHUB_OUTPUT
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: ${{ steps.release_notes.outputs.notes }}
          generate_release_notes: false
